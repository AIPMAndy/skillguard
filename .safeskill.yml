# SkillGuard Configuration
# Used by safeskill.py when scanning a project directory.

scan:
  extensions:
    - .py
    - .md
    - .sh
    - .yml
    - .yaml
    - .json
    - .js
    - .ts

  exclude_dirs:
    - .git
    - __pycache__
    - node_modules
    - .venv
    - venv
    - dist
    - build
    - .cache
    - .tox
    - .pytest_cache

  # Files/patterns to exclude from scanning.
  # The project scans code examples a lot, so we exclude docs/tests/self by default
  # to avoid self-referential false positives in this repository.
  exclude_files:
    - "*.min.js"
    - "tests/*"
    - "README*.md"
    - "CHANGELOG*"
    - "LICENSE*"
    - "ROADMAP.md"
    - "safeskill.py"
    - ".safeskill.yml"
    - ".github/workflows/*"

rules:
  disabled: []

  severity:
    eval_exec: MEDIUM
    network_request: LOW

  custom:
    - id: custom_api_key
      name: Custom API Key Pattern
      level: HIGH
      pattern: "mycompany_api_key\\s*=\\s*['\"]\\w+"
      description: "Hardcoded company API key"
      remediation: "Use environment variables for API keys"

report:
  format: markdown
  show_remediation: true
  show_snippets: true
  snippet_length: 80

ci:
  fail_on: HIGH
  exit_codes:
    clean: 0
    low: 0
    medium: 0
    high: 1
    critical: 1
