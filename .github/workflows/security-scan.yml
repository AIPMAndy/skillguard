name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'

jobs:
  safeskill-scan:
    runs-on: ubuntu-latest
    name: SkillGuard Security Scan
    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install SkillGuard
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .

    - name: Run SkillGuard Scan
      run: |
        python safeskill.py . --format sarif --output safeskill-results.sarif --quiet || true

    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: safeskill-results.sarif
        category: safeskill

    - name: Check for Critical Issues
      run: |
        python safeskill.py . --fail-on critical --quiet
