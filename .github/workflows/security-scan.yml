name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 9 AM UTC+8
    - cron: '0 1 * * *'

jobs:
  safeskill-scan:
    runs-on: ubuntu-latest
    name: SkillGuard Security Scan
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install SkillGuard
      run: |
        pip install -e .
    
    - name: Run SkillGuard Scan
      run: |
        safeskill . --format sarif --output safeskill-results.sarif || true
    
    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: safeskill-results.sarif
        category: safeskill
    
    - name: Check for Critical Issues
      run: |
        safeskill . --fail-on critical || echo "Critical issues found, check SARIF report"
      continue-on-error: true
